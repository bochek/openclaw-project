services:
  postgres:
    image: postgres:16-alpine
    container_name: tasks-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=goclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  tasks-api:
    build:
      context: ./tasks-api
      dockerfile: Dockerfile
    container_name: tasks-api
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/goclaw?sslmode=disable
      - PORT=8082
    depends_on:
      postgres:
        condition: service_healthy

  kanban:
    image: nginx:alpine
    container_name: kanban-ui
    ports:
      - "8080:80"
    volumes:
      - ./tasks-api/kanban.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - tasks-api

  local-mcp:
    build:
      context: ./local_mcp
    container_name: local-mcp
    ports:
      - "8000:8000"
    volumes:
      - ./local_mcp/chroma_db:/app/chroma_db
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - EMBEDDING_MODEL=qwen3-embedding
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
