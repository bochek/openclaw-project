services:
  goclaw-ui:
    image: node:22-alpine
    container_name: goclaw-ui
    working_dir: /app/ui/web
    volumes:
      - ./temp_goclaw:/app
    ports:
      - "8081:3000"
    environment:
      # These variables point your local UI to the cloud Render GPU/Agent
      - VITE_BACKEND_HOST=goclaw-agent.onrender.com
      - VITE_BACKEND_PORT=443
      - VITE_BACKEND_PROTOCOL=https
      - VITE_WS_URL=wss://goclaw-agent.onrender.com/ws
    # Install pnpm, download packages, and start the development server
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev --host 0.0.0.0 --port 3000"
