services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-agent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    # Adding security caps for browser automation if needed
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined

networks:
  default:
    name: openclaw-network
