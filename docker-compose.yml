services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-agent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    depends_on:
      - mission-control

  mission-control:
    image: builderz-labs/mission-control:latest
    container_name: mission-control
    restart: unless-stopped
    ports:
      - "${MISSION_CONTROL_PORT:-3001}:3000"
    env_file:
      - .env
    volumes:
      - ./data/mission-control:/app/data
    environment:
      - NEXTAUTH_URL=http://localhost:${MISSION_CONTROL_PORT:-3001}

networks:
  default:
    name: openclaw-network
