services:
  - type: web
    name: goclaw-agent
    runtime: docker
    plan: starter # Starter plan for Persistent Disk Support
    healthCheckPath: /health
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: GOCLAW_POSTGRES_DSN
        fromDatabase:
          name: goclaw-db
          property: connectionString
      - key: TS_AUTHKEY
        sync: false # Set this in Render Dashboard (Secret)
      - key: TS_HOSTNAME
        value: goclaw-render
      # AI Provider (GoClaw specific environment variable)
      - key: GOCLAW_OPENROUTER_API_KEY
        sync: false
      # Telegram
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    disk:
      name: goclaw-data
      mountPath: /data
      sizeGB: 1

databases:
  - name: goclaw-db
    databaseName: goclaw
    user: goclaw
    plan: free
