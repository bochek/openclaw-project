services:
  - type: web
    name: goclaw-agent
    runtime: docker
    plan: starter # Starter plan for Persistent Disk Support
    healthCheckPath: /health
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: GOCLAW_POSTGRES_DSN
        fromDatabase:
          name: goclaw-db
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: goclaw-db
          property: connectionString
      - key: GOCLAW_AUTO_UPGRADE
        value: "true"
      - key: GOCLAW_TELEGRAM_TOKEN
        sync: false
      - key: GOCLAW_ENCRYPTION_KEY
        sync: false # 64-char hex string
      - key: GOCLAW_GATEWAY_TOKEN
        sync: false
      - key: TS_AUTHKEY
        sync: false
      - key: TS_HOSTNAME
        value: echo-bot-render
      - key: GOCLAW_OPENROUTER_API_KEY
        sync: false
    disk:
      name: goclaw-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: tasks-api
    runtime: docker
    dockerContext: .
    dockerfilePath: ./tasks-api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goclaw-db
          property: connectionString

databases:
  - name: goclaw-db
    databaseName: goclaw
    user: goclaw
    plan: free
