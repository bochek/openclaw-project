services:
  - type: web
    name: openclaw-agent
    runtime: docker
    plan: starter # Starter plan for Persistant Disk Support
    healthCheckPath: /health
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: TS_AUTHKEY
        sync: false # Set this in Render Dashboard (Secret)
      - key: TS_HOSTNAME
        value: openclaw-render
      # Together AI
      - key: TOGETHER_API_KEY
        sync: false
      # Telegram
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
